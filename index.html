<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="DropStrack — CS2 Weekly Drop Tracker with live prices & countdown">
  <meta property="og:title" content="DropStrack — CS2 Drop Tracker">
  <meta property="og:description" content="Live CS2 weekly drop countdown + Steam Market prices">
  <meta name="theme-color" content="#ff006e">
  <title>DropStrack — CS2 Drop Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <script src="i18n.js"></script>
</head>
<body>

<div id="cur-ring" aria-hidden="true"></div>
<div id="cur-dot" aria-hidden="true"></div>
<div id="scroll-bar" aria-hidden="true"></div>
<canvas id="bg-canvas" aria-hidden="true"></canvas>

<header id="header">
  <div class="logo-wrap">
    <div class="logo-neon" aria-hidden="true">⚡</div>
    <div>
      <div class="logo-text">DROP<span>STRACK</span></div>
      <div class="logo-sub">CS2 Drop Tracker</div>
    </div>
  </div>

  <nav aria-label="Main navigation">
    <a href="#drops" data-i18n="activeTitle">Drops</a>
    <a href="#cases" data-i18n="allTitle">All Cases</a>
    <a href="#how" data-i18n="howTitle">How It Works</a>
  </nav>

  <button id="btn-sound" onclick="toggleSound()" class="btn-neon">🔊 SOUND</button>
</header>

<!-- ANUNCIOS (ocultos temporalmente) -->
<!-- <div class="ad-slot">
  <div class="ad-ph ad-728">Advertisement 728×90</div>
</div> -->

<section id="hero" aria-label="Weekly drop countdown">
  <div class="hero-grid">
    <div class="hero-left">
      <div class="hero-label" data-i18n="eyebrow">🎁 Weekly Reset</div>
      <h1 class="hero-title">
        <span class="neon-pink">NEXT</span>
        <span class="neon-cyan">DROP</span>
      </h1>
      <p class="hero-desc" data-i18n="heroDesc">Every Wednesday at 01:00 GMT · Prime Status Required</p>
    </div>

    <div class="hero-right">
      <div class="timer-box">
        <div class="timer-label" data-i18n="timerLabel">Countdown</div>
        <div class="timer-display">
          <div class="timer-unit"><div class="timer-val" id="t-d">00</div><div class="timer-lbl" data-i18n="days">Days</div></div>
          <div class="timer-sep">:</div>
          <div class="timer-unit"><div class="timer-val" id="t-h">00</div><div class="timer-lbl" data-i18n="hours">Hours</div></div>
          <div class="timer-sep">:</div>
          <div class="timer-unit"><div class="timer-val" id="t-m">00</div><div class="timer-lbl" data-i18n="mins">Mins</div></div>
          <div class="timer-sep">:</div>
          <div class="timer-unit"><div class="timer-val" id="t-s">00</div><div class="timer-lbl" data-i18n="secs">Secs</div></div>
        </div>
      </div>

      <div class="week-progress">
        <div class="week-label">
          <span data-i18n="weekStart">Week Progress</span>
          <span id="week-pct">0%</span>
        </div>
        <div class="week-bar-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" id="week-bar-role">
          <div class="week-bar-fill" id="week-fill"></div>
        </div>
      </div>

      <div class="reset-info">
        <div><strong>GMT:</strong> Wed 01:00</div>
        <div><strong>Local:</strong> <span id="local-time">—</span></div>
      </div>
    </div>
  </div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="bg3d.js"></script>
<script src="app.js"></script>

</body>
</html>
