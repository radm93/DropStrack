name: Update CS2 Case Prices

on:
  schedule:
    - cron: '0 */6 * * *'     # ← Cada 6 horas (recomendado)
  workflow_dispatch:          # Permite ejecutarlo manualmente

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest prices from Steam
        run: python scripts/fetch_prices.py

      - name: Commit updated prices if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/prices.json
          if git diff --staged --quiet; then
            echo "No new prices to update"
          else
            git commit -m "chore: update case prices $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
